spring.application.name=hospital-management

server.port=${SERVER_PORT:8080}

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.jackson.time-zone=UTC

app.security.jwt.issuer=hospital-management
app.security.jwt.secret=${JWT_SECRET}
app.security.jwt.access-token-minutes=15
app.security.jwt.refresh-token-days=7

app.security.auth.max-failed-attempts=5
app.security.auth.lock-duration-minutes=15
